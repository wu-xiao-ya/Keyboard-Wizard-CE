name: Release CE

on:
  push:
    tags:
      - forge-1.20.1-v*
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release bundle
        run: ./gradlew build releaseBundle --warning-mode all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 按键精灵社区版（Keyboard Wizard CE） Forge 1.20.1 ${{ github.ref_name }}
          files: |
            build/libs/*.jar
            build/release/*.zip
            build/release/SHA256SUMS.txt
          body_path: CHANGELOG.md
