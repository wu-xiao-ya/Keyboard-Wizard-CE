name: Build CE

on:
  push:
    branches:
      - ce/fabric-1.20.1
  pull_request:
    branches:
      - ce/fabric-1.20.1
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build releaseBundle --no-daemon --stacktrace --warning-mode all

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-wizard-ce-fabric-1.20.1
          path: |
            build/libs/*.jar
            build/release/*.zip
            build/release/SHA256SUMS.txt
