name: Build CE

on:
  push:
    branches:
      - ce/neoforge-1.21.1
  pull_request:
    branches:
      - ce/neoforge-1.21.1
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew assemble

      - name: Generate checksums
        run: |
          cd build/libs
          sha256sum *.jar > SHA256SUMS.txt

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-wizard-ce-neoforge-1.21.1
          path: |
            build/libs/*.jar
            build/libs/SHA256SUMS.txt
