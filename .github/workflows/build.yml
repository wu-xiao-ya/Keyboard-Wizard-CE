name: Build CE

on:
  push:
    branches:
      - ce/neoforge-1.21.1
  pull_request:
    branches:
      - ce/neoforge-1.21.1
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew assemble releaseBundle

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-wizard-ce-neoforge-1.21.1
          path: |
            build/libs/*.jar
            build/release/*.zip
            build/release/SHA256SUMS.txt
