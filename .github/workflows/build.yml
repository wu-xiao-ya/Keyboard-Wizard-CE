name: Build CE

on:
  push:
    branches:
      - ce/neoforge-26.1.2
  pull_request:
    branches:
      - ce/neoforge-26.1.2
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew assemble

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-wizard-ce-neoforge-26.1.2
          path: build/libs/*.jar
