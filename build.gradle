plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.37'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
}

repositories {
    def localNeoMaven = providers.gradleProperty('neoLocalMaven')
            .orElse(providers.environmentVariable('NEOFORGE_LOCAL_MAVEN'))
            .orNull
    if (localNeoMaven) {
        maven {
            name = 'LocalNeoForgedCache'
            url = uri(localNeoMaven)
            metadataSources {
                mavenPom()
                gradleMetadata()
                artifact()
            }
        }
    }
    maven {
        url "https://maven.nova-committee.cn/releases"
    }
}

dependencies {
    implementation "net.neoforged:neoforge:${project.neo_version}"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

tasks.named('jar', Jar).configure {
    from(['LICENSE.md', 'COPYING.md', 'NOTICE.md', 'README.md']) {
        into 'META-INF'
    }
}

processResources {
    filteringCharset = 'UTF-8'

    def replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            neo_version_range      : neo_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }

    repositories {
        maven {
            name = 'release'
            url = 'https://maven.nova-committee.cn/releases'
            credentials {
                username = System.getenv('MAVEN_USERNAME')
                password = System.getenv('MAVEN_PASSWORD')
            }
        }
    }
}
